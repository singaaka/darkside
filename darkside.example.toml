# darkside operator config. Copy to darkside.toml and edit.
# Per-app config lives in each app's repo as darkside.toml.

# Full HTTPS URL where darkside is reachable. This goes into GitHub webhook +
# manifest callback URLs, so it must match DNS + match DARKSIDE_HOST in .env.
external_url = "https://darkside.example.com"

# Runtime state lives here inside the container (sqlite, cloned repos).
data_dir = "/data"

# What darkside binds to inside its container. Traefik fronts this.
listen = ":8080"

# Nomad HTTP API. Nomad runs on the same compose bridge network, so we reach
# it by service name.
nomad_addr = "http://nomad:4646"

# Docker daemon endpoint. The mounted unix socket is the default.
docker_host = "unix:///var/run/docker.sock"
