# darkside: nomad + traefik + darkside, one command.
#
# Setup:
#   1. cp darkside.example.toml darkside.toml   (edit `external_url` to the
#                                                HTTPS URL where darkside lives)
#   2. cp .env.example .env                     (edit DARKSIDE_HOST,
#                                                DARKSIDE_BASIC_AUTH, ACME_EMAIL)
#   3. docker compose up -d --build
#
# All three containers — traefik, nomad, darkside — share the `darkside`
# bridge network and reach each other by compose service name. Apps deployed
# via nomad also land on this network (the docker driver is told to use
# `network_mode = "darkside"` per task by the deployer), so traefik can route
# to them by container name with no host-side port mapping.

services:
  traefik:
    image: traefik:v3.7.4
    container_name: darkside-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false
      # Entrypoints:
      #   - web      :80  used for the ACME http-01 challenge + redirect to https
      #   - websecure:443 production traffic (HTTPS)
      #   - debug    :8000 catch-all that always hits darkside, no Host check.
      - --entryPoints.web.address=:80
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.websecure.address=:443
      - --entryPoints.debug.address=:8000
      # Let's Encrypt cert resolver. HTTP-01 challenge uses the `web` entrypoint
      # so port 80 must be reachable from the public internet.
      - --certificatesResolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesResolvers.letsencrypt.acme.storage=/data/acme.json
      - --certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.nomad=true
      - --providers.nomad.endpoint.address=http://nomad:4646
      - --providers.nomad.exposedByDefault=false
      - --log.level=INFO
      - --accessLog=true
    environment:
      DOCKER_API_VERSION: "1.43"
    ports:
      - "80:80"
      - "443:443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik:/data
    networks:
      - darkside
    depends_on:
      - nomad

  nomad:
    image: hashicorp/nomad:2.0
    container_name: darkside-nomad
    restart: unless-stopped
    # Privileged + cap_add for nomad's cgroup management and docker driver use.
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./configs/nomad.hcl:/etc/nomad.d/nomad.hcl:ro
      - ./data/nomad:/opt/nomad/data
      - /tmp:/tmp
    networks:
      - darkside
    ports:
      # Optional: expose the nomad UI/API on the host for direct access.
      - "4646:4646"
    command:
      - agent
      - -config=/etc/nomad.d/nomad.hcl

  darkside:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darkside
    restart: unless-stopped
    depends_on:
      - nomad
    environment:
      DARKSIDE_CONFIG: /etc/darkside/config.toml
    volumes:
      - ./darkside.toml:/etc/darkside/config.toml:ro
      - ./data/darkside:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - darkside
    labels:
      - traefik.enable=true
      # ── Debug catch-all on :8000 ─────────────────────────────────────────
      # Any request to :8000 hits darkside, regardless of Host. No basic
      # auth, no TLS. Bind this to localhost / a vpn / a private interface
      # — don't expose to the public internet.
      - traefik.http.routers.darkside-debug.rule=PathPrefix(`/`)
      - traefik.http.routers.darkside-debug.entrypoints=debug
      - traefik.http.routers.darkside-debug.service=darkside
      # ── Production HTTPS ─────────────────────────────────────────────────
      - traefik.http.routers.darkside-tls.rule=Host(`${DARKSIDE_HOST}`)
      - traefik.http.routers.darkside-tls.entrypoints=websecure
      - traefik.http.routers.darkside-tls.tls.certresolver=letsencrypt
      - traefik.http.routers.darkside-tls.middlewares=darkside-auth@docker
      - traefik.http.routers.darkside-tls.service=darkside
      # ── Webhook bypass (HTTPS, no auth, higher priority) ─────────────────
      - traefik.http.routers.darkside-webhook.rule=Host(`${DARKSIDE_HOST}`) && PathPrefix(`/webhooks/`)
      - traefik.http.routers.darkside-webhook.entrypoints=websecure
      - traefik.http.routers.darkside-webhook.tls.certresolver=letsencrypt
      - traefik.http.routers.darkside-webhook.priority=200
      - traefik.http.routers.darkside-webhook.service=darkside
      # ── Service + middleware ─────────────────────────────────────────────
      - traefik.http.services.darkside.loadbalancer.server.port=8080
      - traefik.http.middlewares.darkside-auth.basicauth.users=${DARKSIDE_BASIC_AUTH}

networks:
  darkside:
    # Pin the name so nomad's docker driver can attach allocs to it by name.
    # If you rename here, also update the deployer's network_mode template
    # constant in internal/deployer/nomadjob.go.
    name: darkside
    driver: bridge
